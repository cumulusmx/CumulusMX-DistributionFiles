		<style>
			input[type=text] { max-width: 8em;}
			#recent tr >td {border-bottom: thin dotted var(--color6)!important;}
			#recent tbody tr:last-of-type{border-bottom: 1px solid var(--color5)!important;}
			.dtfc-fixed-start:nth-of-type(2) { border-right: thin solid var(--color5);}
			/*	This block adjusts the hover highlight.  Just delete if not wanted	*/
			tr:hover > td {
				background: var(--gradient-databar);
			}
			.dt-paging { display:flex; justify-content: center; gap:1em;}
			.dt-paging-input input {background: var(--color1); color: var(--color9); max-width:5em;}

						/*	Units	*/
			/*	Adjust size of units	*/
			#recent tbody .tempUnits::after,
			#recent tbody .percent::after,
			#recent tbody .bearing::after		{ font-size: 0.6em; padding-left: 0.3em; vertical-align: top;}
			#recent tbody .windUnits::after,
			#recent tbody .windRunUnits::after,
			#recent tbody .rainUnits::after,
			#recent tbody .rainRateUnits::after,
			#recent tbody .pressUnits::after,
			#recent tbody .hours::after,
			#recent tbody .solarUnits::after	{ font-size: 0.6em; padding-left: 0.3em; vertical-align: baseline;}

			/*	You MAY need to manually edit the following styles to match your units	*/
			#recent tbody .percent::after   	{ content:"%"; }
			#recent tbody .bearing::after    	{ content:"°"; }
			#recent tbody .solarUnits::after 	{ content:"w/m\00b2"; }
			#recent tbody .aq2-5Units::after	{ content:"-";}
			#recent tbody .aq10Units::after		{ content:"-";}

			/*	All other styles are in the file 'ai-editabletables.css'	*/
		</style>
