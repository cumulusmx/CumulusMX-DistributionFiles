		<!-- date picker -->

    	<link href="/lib/jquery-ui-custom/jquery-ui.structure.min.css" rel="stylesheet">
    	<link href="/lib/jquery-ui-custom/jquery-ui.theme.min.css" rel="stylesheet">

		<!--	Sitewide Styles		-->
		<link rel="stylesheet" href="css/theme.css" id="Theme">
		<link rel="stylesheet" href="css/w3v5.css">
		<link rel="stylesheet" href="css/main.css">

		<!--	Sitewide Scripts	-->
		<script src="js/ai-page-ctrl.js"></script>
		<script src="js/dailydata.js"></script>

		<!--	Local scripts & styles	-->
		<script>
		</script>
		<style>
			#dateFrom, #dateTo {
				max-width:12em;
			}
			#format {
				border-radius: 1em 0 0 1em;
				padding: .3em 0 .3em 1em;
			}
			.ows-btnBar > input,
			.ow-btnBar > button {
				border-radius: 1em;
				padding: 0.3em 0;
				text-align:center;
				border:thin solid var(--color5);
			}
			.mylabel {
				margin-left:1em;
			}
			#customGrid {
				display: grid;
				gap: 1em 1vh;
				grid-template-columns: repeat(4, 1fr);
				grid-template-areas: 
				/* This list dictates how the various panels are arrainged	*/
					"temp hums press derived" 
					"wind rain solar derived" 
					"degdays . . derived";
				margin-bottom:1vh;
			}
			.tempPanel { grid-area: temp;}
			.humsPanel { grid-area: hums;}
			.pressPanel { grid-area: press;}
			.extrasPanel { grid-area: derived;}
			.windPanel { grid-area: wind;}
			.rainPanel { grid-area: rain;}
			.solarPanel { grid-area: solar;}
			.degdaysPanel { grid-area: degdays;}
			#customGrid .ows-titleFlex {margin-top:1vh;}
			@media (max-width: 1000px) {
				#customGrid {
					grid-template-columns: repeat(3, 1fr);
					grid-template-areas:
						"temp solar derived"
						"hums press derived"
						"wind rain derived"
						"degdays . derived";
				}
			}
			@media (max-width: 800px) {
				#customGrid {
					grid-template-columns: repeat(2, 1fr);
					grid-template-areas: 
						"temp derived"
						"solar derived"
						"degdays derived"
						"wind rain"
						"hums press"
				}
			}
		</style>
	</head>
	<body class="ows-theme9">
        <header id="Banner" class="ows-theme5 w3-bottombar ows-theme1-bdr" style="min-height: 6em;">
            <img src="img/flying-gull.png" alt="Seagull" id="flyingGull">
            <section id="subBanner" class="pageWidth" >
                <img src="img/AI-Logo.png" id="#siteLogo" alt="AI Logo" class="w3-image" style="padding:1vh 0 .5vh 0;">
                <div id="siteInfo">
                    <h4 style="grid-area:siteName;"><span data-owsData="Station">Site Name</span></h4>
                    <p>{{LATITUDE}}:</p><p><span data-cmxData="latitude">N 179&deg; 59" 59'</span></p>
                    <p>{{LONGITUDE}}:</p><p><span data-cmxData="longitude">W 179&deg; 59" 50'</span></p>
                    <p>{{ALTITUDE}}:</p><p><span data-cmxData="altitude">2000 m</span></p>
                </div>
                <nav id="MainMenu" class="ows-theme6"></nav>
            </section>
        </header>

        <section id="Content">
            <div  id="MobileMenu" class="w3-sidebar w3-bar-block w3-container ows-theme4 w3-animate-right"><!-- Sidebar Here     --></div>
            <img src="img/Gull.png" alt="Seagull" id="Gull1"> <!--    Gull goes here  -->
            <section id="subContent" class="pageWidth" style="min-height: 60em;">
				<!--	Page Title	-->
				<div class="w3-container">
					<div class="ows-titleBar">
						<h1>{{DAILY_DATA_VIEWER}}</h1>
					</div>
				</div>

				<div class="ows-grid col3" style="margin-bottom:0;">
					<!--	Date / Time Range	-->
					<div class="w3-container no-shadow" style="order:1;padding-bottom:0;">
						<div class="ows-titleFlex"><h4>{{DATE_RANGE}}</h4></div>
						<div class="ows-btnBar" style="margin:1vh 0;">
							<label for="dateFrom">{{START_DATE}}:</label><input type="text" id="dateFrom" class="ows-theme0" autocomplete="off" aria-label="Start date-time, input format is full year hyphen month hyphen day space 24-hours colon minutes">
						</div>
						<div class="ows-btnBar">
							<label for="dateTo">{{END_DATE}}:</label><input type="text" id="dateTo" class="ows-theme0" autocomplete="off" aria-label="End date-time, input format is full year hyphen month hyphen day space 24-hours colon minutes">
						</div>
					</div>
					<!--	Panel 2 / column 2	-->
					<div class="w3-container no-shadow" style="order:1;padding-bottom:0;">
						<div class="ows-titleFlex"><h4>{{VIEWING_FORMAT}}</h4></div>
							<div class="ows-btnBar" style="margin-top:1vh;">
							<label class="" for="format">View output as:</label>
							<select id="format" class=" ows-theme0 ows-theme-grad-down-hvr">
								<option>{{TABLE}}</option>
								<option>CSV</option>
							</select>
						</div>
					</div>
					<div class="w3-container no-shadow" style="order:2;padding-bottom:0;">
						<div class="ows-titleFlex"><h4>Options</h4></div>
						<div class="ows-btnBar" style="column-gap:1vh; margin-top:1vh; align-items:flex-end;">
							<button type="button" class="w3-button ax-btn-gradient-up" onclick="showData()">{{VIEW_DATA}}</button> 
							<button type="button" class="w3-button ax-btn-gradient-up" onclick="downloadData()">{{DOWNLOAD_CSV}}</button>
						</div>
					</div>
				</div>
				<!-- New container inserted here -->
			</section>
		</section>
		
        <footer id="Footer" class="ows-theme5 w3-topbar ows-theme1-bdr">
            <section id="subFooter" class="pageWidth">
                <p style="margin:0">{{SITE_DESIGN}}: <span class="ows-theme7-txt">Oaktree Weather Systems</span> V5 <span class="ows-theme7-txt w3-small" data-owsData="Build">(b:0.0)</span></p>
                <h5>{{POWERED_BY}} <span class="ows-theme9-txt">CumulusMX</span> <span data-cmxData="Version">V4.6.4</span> <span class="ows-theme9-txt w3-small" data-cmxData="Build">b: 4127</span></h5>
            </section>
        </footer>

	</body>
</html>
