<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>{{HISTORIC_CHARTS}}</title>
		<link rel="icon" type="image/png" href="img/favicon.png">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="" id="metaDescription">
		<meta name="author" content="Neil Thomas 2025">

		<!--	Fonts	-->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Red+Rose:wght@400;500;600&display=swap">
		<!--	FontAwsome CDN	-->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" >

		<!--	jQuery CDN		-->
		<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js" integrity="sha512-3gJwYpMe3QewGELv8k/BX9vcqhryRdzRMxVfq6ngyWXwo03GFEzjsUm8Q7RZcHPHksttq7/GFoxjCVUjkjvPdw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>-->
		<!--	If your Weather Station System does NOT have Internet access uncomment these 2 lines	-->
		<script src="/lib/jquery/jquery-latest.min.js"></script>
		<script src="/lib/jquery/jquery.tmpl.js"></script>

		<!-- ChartJS -->
    	<script src="/lib/chartjs/chart.umd.min.js"></script>
    	<script src="/lib/luxon/luxon.min.js"></script>
    	<script src="/lib/chartjs/chartjs-adapter-luxon.umd.min.js"></script>

		<!--	Sitewide Styles		-->
		<link rel="stylesheet" href="css/theme.css" id="Theme">
		<link rel="stylesheet" href="css/w3v5.css">
		<link rel="stylesheet" href="css/main.css">

		<!--	Sitewide Scripts	-->
		<script src="js/ai-page-ctrl.js"></script>
		<script src="js/chartshistoric.js"></script>	<!-- 	Local Script	-->
		<script src="/js/chartjsextras.js"></script>	<!--	Script needed to run charts	-->

		<!--	Local scripts & styles	-->
		<script>
		</script>
		<style>
			#chartcontainer {
				display: grid;
				grid-template-rows: 1fr 30em;
				grid-auto-rows: 7em;
				gap: 1em;
				padding: 1em;
				border: 1px solid var(--color5);
				background: linear-gradient( 33deg, var(--color8), var(--color9));
			}
			.chart-buttons {
				display: flex;
				justify-content: space-between;
				color: var(--color1);
			}
			.chart-buttons button {
				border-radius: 1em;
				border: thin solid var(--color5);
				background: var(--gradient-up);
				color: var(--color1);
				padding: .1em 1em;
			}
			.chart-buttons button:hover {
				background: var(--gradient-down);
			}
			#rangeButtons button {
				margin-left:0.5em;
			}
			#mainChart, #navChart {
				height: 100%;
				width:100%;
				background: white;
			}
		</style>
	</head>
	<body class="ows-theme9">
        <header id="Banner" class="ows-theme5 w3-bottombar ows-theme1-bdr" style="min-height: 6em;">
            <img src="img/flying-gull.png" alt="Seagull" id="flyingGull">
            <section id="subBanner" class="pageWidth" >
                <img src="img/AI-Logo.png" id="#siteLogo" alt="AI Logo" class="w3-image" style="padding:1vh 0 .5vh 0;">
                <div id="siteInfo">
                    <h4 style="grid-area:siteName;"><span data-owsData="Station">Site Name</span></h4>
                    <p>Latitude:</p><p><span data-cmxData="latitude">N 179&deg; 59" 59'</span></p>
                    <p>Longitude:</p><p><span data-cmxData="longitude">W 179&deg; 59" 50'</span></p>
                    <p>Altitude:</p><p><span data-cmxData="altitude">2000 m</span></p>
                </div>
                <nav id="MainMenu" class="ows-theme6"></nav>
            </section>
        </header>

        <section id="Content">
            <div  id="MobileMenu" class="w3-sidebar w3-bar-block w3-container ows-theme4 w3-animate-right"><!-- Sidebar Here     --></div>
            <img src="img/Gull.png" alt="Seagull" id="Gull1"> <!--    Gull goes here  -->
            <section id="subContent" class="pageWidth">
 				<!--	Page Title	-->
				<div class="w3-container">
					<div class="ows-titleFlex">
						<h1>{{HISTORIC_CHARTS}}</h1>
						<p class="tagline">{{PAGE_UPDATED}}: <span data-cmxData="update"></span></p>
					</div>
				</div>
				<!--	Section of one column layouts	-->
				<div class="ows-grid col1" style="gap:0;">
					<!--	Buttons	-->
					<div class="w3-container no-shadow" style="order:1;margin-bottom:0;">
						<div class="ows-btnBar" style="order:1;gap:0.5em 0.25em;/* margin: 1vh 0;*/"><!--	Adjust gaps to suit	-->
							<button id="temp" class="w3-button ows-theme-grad-down-hvr" aria-label="Temperatures">{{TEMPERATURE}}</button>
							<button id="press" class="w3-button ows-theme-grad-down-hvr" aria-label="Pressure">{{PRESSURE}}</button>
							<button id="wind" class="w3-button ows-theme-grad-down-hvr" aria-label="Wind speeds">{{WIND_SPEED}}</button>
							<button id="windDir" class="w3-button ows-theme-grad-down-hvr w3-hide" aria-label="Wind direction">{{WIND_DIRECTION}}</button>
							<button id="humidity" class="w3-button ows-theme-grad-down-hvr" aria-label="Humidity">{{HUMIDITY}}</button>
							<button id="rain" class="w3-button ows-theme-grad-down-hvr" aria-label="Rainfall">{{RAINFALL}}</button>
							<button id="solar" class="w3-button ows-theme-grad-down-hvr" aria-label="Solar">{{SOLAR}}</button>
							<button id="degdays" class="w3-button ows-theme-grad-down-hvr" aria-label="Degree days" >{{DEGREE_DAYS}}</button>
							<button id="tempsum" class="w3-button ows-theme-grad-down-hvr" aria-label="Temperature summation">{{TEMP_SUM}}</button>
							<button id="chillhrs" class="w3-button ows-theme-grad-down-hvr" aria-label="Chill hours">{{CHILL_HOURS}}</button>
							<button id="snow" class="w3-button ows-theme-grad-down-hvr" aria-label="Snowfall">{{SNOWFALL}}</button>
						</div>
					</div>
					<!--	Chart	-->
					<div class="w3-container" style="order:1; margin-bottom:1vh;">
						<div id="chartcontainer" class="chart-wrap" style="margin-top:1vh">
							<div class="chart-buttons">
								<div id="rangeButtons"></div>
								<div>
                        			<button id="btnPrint">{{PRINT}}</button>
                        			<button id="btnFullscreen">{{FULLSCREEN}}</button>
                    			</div>
                			</div>
							<div id="mainChartContainer" class="mainChartContainer">
                    			<canvas id="mainChart"></canvas>
                			</div>
							<div id="navChartContainer" class="navChartContainer">
                    			<canvas id="navChart"></canvas>
                			</div>
						</div>
					</div>
				</div>	<!--	End of one column layout	-->
				<!--	Information	-->
				<div class="w3-container no-shadow" style="order:3;">
					<p class="w3-center" id="chartdescription">Description</p>
				</div>
			</section>
		</section>

 		<footer id="Footer" class="ows-theme5 w3-topbar ows-theme1-bdr">
            <section id="subFooter" class="pageWidth">
                <p style="margin:0">Site design: <span class="ows-theme7-txt">Oaktree Weather Systems</span> V5 <span class="ows-theme7-txt w3-small" data-owsData="Build">(b:0.0)</span></p>
                <h5>Powered by <span class="ows-theme9-txt">CumulusMX</span> <span data-cmxData="Version">V4.6.4</span> <span class="ows-theme9-txt w3-small" data-cmxData="Build">b: 4127</span></h5>
            </section>
        </footer>


	</body>
</html>
