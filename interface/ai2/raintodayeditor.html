	<head>
		<meta charset="utf-8">
		<title>{{TODAYS_RAIN_EDITOR}} - CumulusMX</title>
		<link rel="icon" type="image/png" href="img/favicon.png">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="" id="metaDescription">
		<meta name="author" content="Neil Thomas 2025">

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

		<script src="/lib/jquery/jquery-latest.min.js"></script>
		<script src="/lib/jquery/jquery.tmpl.js"></script>

		<!--	Sitewide Styles		-->
		<link rel="stylesheet" href="css/theme.css" id="Theme">
		<link rel="stylesheet" href="css/w3v5.css">
		<link rel="stylesheet" href="css/main.css">

		<!--	Sitewide Scripts	-->
		<script src="js/ai-page-ctrl.js"></script>
		<script src="/js/raintodayeditor.js"></script><!-- 	Used DEFAULT script 	-->

		<!--	Local scripts & styles	-->
		<script>
		</script>
		<style>
			#rainGrid {
				display: grid;
				grid-template-columns: 1fr 7em;
				gap: .2vh var(--colGap);
				align-items: baseline;
			}
			input[type=number] {
				border-radius: 1em 0 0 1em;
				border: thin solid var(--color5);
				padding: .3em 0 .3em 1em
			}
		</style>
	</head>
	<body class="ows-theme9">
        <header id="Banner" class="ows-theme5 w3-bottombar ows-theme1-bdr" style="min-height: 6em;">
            <img src="img/flying-gull.png" alt="Seagull" id="flyingGull">
            <section id="subBanner" class="pageWidth" >
                <img src="img/AI-Logo.png" id="#siteLogo" alt="AI Logo" class="w3-image" style="padding:1vh 0 .5vh 0;">
                <div id="siteInfo">
                    <h4 style="grid-area:siteName;"><span data-owsData="Station">Site Name</span></h4>
                    <p>{{LATITUDE}}:</p><p><span data-cmxData="latitude">N 179&deg; 59" 59'</span></p>
                    <p>{{LONGITUDE}}:</p><p><span data-cmxData="longitude">W 179&deg; 59" 50'</span></p>
                    <p>ALTITUDE:</p><p><span data-cmxData="altitude">2000 m</span></p>
                </div>
                <nav id="MainMenu" class="ows-theme6"></nav>
            </section>
        </header>

        <section id="Content">
            <div  id="MobileMenu" class="w3-sidebar w3-bar-block w3-container ows-theme4 w3-animate-right"><!-- Sidebar Here     --></div>
            <img src="img/Gull.png" alt="Seagull" id="Gull1"> <!--    Gull goes here  -->
            <section id="subContent" class="pageWidth">
				<section class="w3-container" style="padding-bottom:0;">
					<div class="ows-titleFlex">
						<h1>{{TODAYS_RAIN_EDITOR}}</h1>
					</div>
				</section>

				<div class="ows-flex col3 ows-fixed">
					<div class="w3-container ows-theme8">
						<div class="ows-titleFlex" style="margin-top:1vh;">
							<h3>{{TODAYS_RAIN_EDITOR_TITLE}}</h3>
							<i class="fa-solid fa-droplet" style="color:#00f;"></i>
						</div>
						<form id="rainform">
							<div id="rainGrid">
								<label for="inputCurrentCounter">{{CURRENT_RAIN_COUNTER}}:</label>
								<input type="number" class="w3-right-align ows-theme1" id="inputCurrentCounter" step="0.01" readonly>
								<label for="inputStartCounter">{{START_OF_DAY_RAIN_COUNTER}}:</label>
								<input type="number" class="w3-right-align ows-theme1" id="inputStartCounter" step="0.01" readonly>
								<label for="inputRainMultiplier">{{RAIN_MULTIPLIER}}:</label>
								<input type="number" class="w3-right-align ows-theme1" id="inputRainMultiplier" step="0.001" readonly>
								<div class="mnuDivider" style="grid-column-start:span 2;"></div>
								<label for="inputRainToday">{{RAIN_TODAY}}</label>
								<input type="number" class="w3-center ows-theme0 ows-theme-grad-down-hvr" id="inputRainToday" name="raintoday" step="0.01">
								<div class="mnuDivider" style="grid-column-start:span 2;"></div>
								<div class="ows-btnBar" style="justify-content: flex-end; grid-column-start: span 2;">
									<button type="submit" class="w3-button ows-theme-grad-down-hvr" style="flex-grow:0;" aria-label="Apply">{{APPLY_CHANGES}}</button>
								</div>
							</div>
						</form>
					</div>
				</div>	<!--	End of three column layout	-->
			</section>
		</section>
		
        <footer id="Footer" class="ows-theme5 w3-topbar ows-theme1-bdr">
            <section id="subFooter" class="pageWidth">
                <p style="margin:0">{{SITE_DESIGN}}: <span class="ows-theme7-txt">Oaktree Weather Systems</span> V5 <span class="ows-theme7-txt w3-small" data-owsData="Build">(b:0.0)</span></p>
                <h5>{{POWERED_BY}} <span class="ows-theme9-txt">CumulusMX</span> <span data-cmxData="Version">V4.6.4</span> <span class="ows-theme9-txt w3-small" data-cmxData="Build">b: 4127</span></h5>
            </section>
        </footer>
 
	</body>
</html>
