		</script>
		<style>
			#dateFrom, #dateTo {
				max-width:12em;
			}
			.ax-btnBar > input,
			.ax-btnBar > button {
				border-radius: 1em;
				padding: 0.3em 0;
				text-align:center;
			}
			.mylabel {
				margin-left:1em;
			}
			div.ows-titleFlex {margin-top:1vh;}
			
			select {
				padding: 0.3em 0 0.3em 1em;
				width: 7em;
				border-radius: 1em 0 0 1em;
				background: var(--color0);
			}
			input[type=text] {
				background: var(--color0);
				border-radius: 1em;
				border:thin solid var(--color5);
				text-align: center;
				padding:.2em 0;
			}
			.dtitle {font-weight:700;font-style:italic;}
		</style>

	<body class="ows-theme9">
        <header id="Banner" class="ows-theme5 w3-bottombar ows-theme1-bdr" style="min-height: 6em;">
            <img src="img/flying-gull.png" alt="Seagull" id="flyingGull">
            <section id="subBanner" class="pageWidth" >
                <img src="img/AI-Logo.png" id="#siteLogo" alt="AI Logo" class="w3-image" style="padding:1vh 0 .5vh 0;">
                <div id="siteInfo">
                    <h4 style="grid-area:siteName;"><span data-owsData="Station">Site Name</span></h4>
                    <p>{{LATITUDE}}:</p><p><span data-cmxData="latitude">N 179&deg; 59" 59'</span></p>
                    <p>{{LONGITUDE}}:</p><p><span data-cmxData="longitude">W 179&deg; 59" 50'</span></p>
                    <p>{{ALTITUDE}}:</p><p><span data-cmxData="altitude">2000 m</span></p>
                </div>
                <nav id="MainMenu" class="ows-theme6"></nav>
            </section>
        </header>

        <section id="Content">
            <div  id="MobileMenu" class="w3-sidebar w3-bar-block w3-container ows-theme4 w3-animate-right"><!-- Sidebar Here --></div>
            <img src="img/Gull.png" alt="Seagull" id="Gull1"> <!--    Gull goes here  -->
            <section id="subContent" class="pageWidth">
				<section class="w3-container" style="padding-bottom:0;">
					<div class="ows-titleFlex">
						<h1>{{INTERVAL_DATA_VIEWER}}</h1>
					</div>
				</section>

				<section class="ows-grid col3" id="test">
					<!--	Date / Time Range	-->
					<div class="w3-container no-shadow" style="order:1; padding-bottom:0">
						<div class="ows-titleFlex" style="margin-bottom:1vh;"><h4>{{DATE_TIME_RANGE}}</h4></div>
						<div class="ows-btnBar" style="margin-bottom:1vh;">
							<label for="dateFrom">{{START_DATE}}:</label><input type="text" id="dateFrom" class="ax-btn-gradient-up" autocomplete="off" aria-label="Start date-time, input format is full year hyphen month hyphen day space 24-hours colon minutes">
						</div>
						<div class="ows-btnBar">
							<label for="dateTo">{{END_DATE}}:</label><input type="text" id="dateTo" class="ax-btn-gradient-up" autocomplete="off" aria-label="End date-time, input format is full year hyphen month hyphen day space 24-hours colon minutes">
						</div>
					</div>
					<!--	Panel 2 / column 2	-->
					<div class="w3-container no-shadow" style="order:1; padding-bottom:0">
						<div class="ows-titleFlex" style="margin-bottom:1vh;"><h4>{{VIEWING_FORMAT}}</h4></div>
							<div class="ows-btnBar">
							<label for="format">View output as:</label>
							<select id="format" class="ows-theme-grad-down-hvr" style="max-width:7em;margin-left:1em;">
								<option>{{TABLE}}</option>
								<option>CSV</option>
							</select>
						</div>
					</div>
					<div class="w3-container no-shadow" style="order:2; padding-bottom:0">
						<div class="ows-titleFlex" style="margin-bottom:1vh;"><h4>Options</h4></div>
						<div class="ows-btnBar" style="align-items:flex-end;">
							<button type="button" class="w3-button ax-theme-grad-down-hvr" onclick="showData()">{{VIEW_DATA}}</button> 
							<button type="button" class="w3-button ax-theme-grad-down-hvr" onclick="downloadData()">{{DOWNLOAD_CSV}}</button>
						</div>
					</div>
				</section>
				<!--	Panels will be inserted here	-->
			</section>
		</section>
		
        <footer id="Footer" class="ows-theme5 w3-topbar ows-theme1-bdr">
            <section id="subFooter" class="pageWidth">
                <p style="margin:0">{{SITE_DESIGN}}: <span class="ows-theme7-txt">Oaktree Weather Systems</span> V5 <span class="ows-theme7-txt w3-small" data-owsData="Build">(b:0.0)</span></p>
                <h5>{{POWERED_BY}} <span class="ows-theme9-txt">CumulusMX</span> <span data-cmxData="Version">V4.6.4</span> <span class="ows-theme9-txt w3-small" data-cmxData="Build">b: 4127</span></h5>
            </section>
        </footer>
